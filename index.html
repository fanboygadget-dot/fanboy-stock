<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Fanboy Stock Viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f5f7}
iframe{border:none;width:100%;height:100%;display:block}
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f7;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
.loader.done{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#007AFF;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{margin-top:16px;color:#666;font-family:-apple-system,sans-serif;font-size:14px}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="spinner"></div>
  <p>Loading Fanboy Stock Viewer...</p>
</div>
<iframe
  id="frame"
  src="https://script.google.com/macros/s/AKfycbyQJzEhuCQyWddOmcmsqmY-jkfNpPjS8mpZOOXEfea-i7_2VMLxQn764fz4aQK7xCey/exec"
  allow="fullscreen"
  loading="eager"
></iframe>
<script>
var f = document.getElementById('frame');
var l = document.getElementById('loader');
f.onload = function() {
  setTimeout(function(){ l.classList.add('done'); }, 500);
};
// fallback: hide loader after 10s even if iframe doesn't fire onload
setTimeout(function(){ l.classList.add('done'); }, 10000);
</script>
</body>
</html>
